[settings.npm]
package_manager = "bun"

[tools]
# Runtimes
go = "1.26.0"
bun = "1.3.9"

# Dev tools
just = "1.46.0"
golangci-lint = "2.11.2"
air = "1.64.5"

# Go-based tools (installed via `go install` backend)
"go:golang.org/x/tools/cmd/goimports" = "latest"
"go:github.com/gzuidhof/tygo" = "0.2.21"
"go:github.com/sqlc-dev/sqlc/cmd/sqlc" = "1.30.0"

# Project tooling (installed via bun, see settings.npm above)
"npm:@xevion/tempo" = "latest"
