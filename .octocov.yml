# generated by octocov init
repository: Xevion/motophoto
coverage:
  if: true
  acceptable: 75%
  exclude:
    - "github.com/Xevion/motophoto/main.go"
    - "github.com/Xevion/motophoto/internal/database/*.go"
    - "github.com/Xevion/motophoto/internal/database/db/*.go"
    - "github.com/Xevion/motophoto/internal/session/*.go"
    - "github.com/Xevion/motophoto/internal/testutil/**/*.go"
codeToTestRatio:
  code:
    - "**/*.go"
    - "!**/*_test.go"
  test:
    - "**/*_test.go"
testExecutionTime:
  if: true
diff:
  datastores:
    - artifact://${GITHUB_REPOSITORY}
comment:
  if: is_pull_request
summary:
  if: true
report:
  if: is_default_branch
  datastores:
    - artifact://${GITHUB_REPOSITORY}
